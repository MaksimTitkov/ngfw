      type: object
      properties:
        '@type':
          type: string
      oneOf:
        - $ref: '#/components/schemas/ValidationDetail'
        - $ref: '#/components/schemas/ErrorDetail'
    LoginRequest:
      required:
        - login
        - password
      type: object
      properties:
        login:
          type: string
          description: Логин администратора.
        password:
          type: string
          description: Пароль администратора.
    LoginResponse:
      type: object
      properties: {}
    LogoutResponse:
      type: object
      properties: {}
    RevokeRequest:
      required:
        - refreshToken
      type: object
      properties:
        refreshToken:
          type: string
          description: >-
            Refresh-токен, который будет отозван и по которому будут отозваны
            все access_token'ы.
    RevokeResponse:
      type: object
      properties: {}
    TokenRequest:
      required:
        - grantType
      type: object
      properties:
        grantType:
          type: string
          description: |-
            Тип предоставляемых данных.
             Поддерживаемые значения: password, refresh_token.
        username:
          type: string
          description: Логин пользователя. Для grant_type = password.
        password:
          type: string
          description: Пароль пользователя. Для grant_type = password.
        clientId:
          type: string
          description: Идентификатор OAuth-приложения. Для grant_type = refresh_token.
        clientSecret:
          type: string
          description: Секрет OAuth-приложения. Для grant_type = refresh_token.
        refreshToken:
          type: string
          description: |-
            Refresh-токен для получения нового access-токена.
             Для grant_type = refresh_token.
    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Base64-encoded токен с коротким временем жизни.
        refreshToken:
          type: string
          description: |-
            Base64-encoded токен с продолжительным временем жизни.
             Используется в запросе Token с grant_type = password.
        expiresIn:
          type: string
          description: Время жизни access_token.
        scope:
          type: string
          description: Права доступа access-токена.
        tokenType:
          type: string
          description: Тип токена.
