    OSPFAreaInterface:
      required:
        - id
        - name
        - virtualInterfaceId
        - linkType
        - priority
        - cost
        - helloIntervalSec
        - deadIntervalSec
        - retransmitIntervalSec
        - transmitDelaySec
        - gracefulHelloDelaySec
        - passive
        - enabled
      type: object
      properties:
        id:
          type: string
          description: Уникальный идентификатор
        name:
          type: string
          description: Имя интерфейса
        virtualInterfaceId:
          type: string
          description: Уникальный идентификатор интерфейса устройства
        linkType:
          enum:
            - OSPF_AREA_LINK_TYPE_UNSPECIFIED
            - OSPF_AREA_LINK_TYPE_BROADCAST
            - OSPF_AREA_LINK_TYPE_P2P
          type: string
          description: Тип соединения на интерфейсе
          format: enum
        priority:
          type: string
          description: Приоритет
        cost:
          type: string
          description: Стоимость интерфейса
        helloIntervalSec:
          type: string
          description: >-
            Интервал, задающий частоту рассылки приветственных сообщений для
            обнаружения соседей
        deadIntervalSec:
          type: string
          description: >-
            Период времени, в течение которого маршрутизатор ожидает ответа
            соседей
        retransmitIntervalSec:
          type: string
          description: >-
            Интервал, задающий частоту повторных передач LSA соседним
            маршрутизаторам
        transmitDelaySec:
          type: string
          description: >-
            Интервал, требуемый для доставки соседним маршрутизаторам обновления
            состояния каналов.
        gracefulHelloDelaySec:
          type: string
          description: >-
            Интервал в течение которого Grace-LSA отправляются с интервалом в 1
            секунду при
             восстановлении после незапланированного отключения. В течение этого времени пакеты
             приветствия не отправляются.
        passive:
          type: boolean
          description: Обозначить интерфейс, как Passive, когда на нем не используется OSPF
        enabled:
          type: boolean
          description: Включить или выключить интерфейс для протокола OSPF
        authProfile:
          allOf:
            - $ref: '#/components/schemas/OSPFAreaAuthProfile'
          description: Профиль аутентификации
        bfdProfile:
          allOf:
            - $ref: '#/components/schemas/OSPFAreaBFDProfile'
          description: Профиль BFD
