    AdminAuthEvent:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        login:
          type: string
        adminId:
          type: string
        roles:
          type: array
          items:
            type: string
        action:
          type: string
        sourceAddress:
          type: string
        error:
          type: string
    AdminListItem:
      required:
        - adminId
        - createdAt
        - creatorId
        - creatorDisplayName
        - passwordChangeRequired
        - roles
        - login
      type: object
      properties:
        adminId:
          type: string
          description: Идентификатор администратора.
        createdAt:
          type: string
          description: Временная метка создания администратора.
          format: date-time
        updatedAt:
          type: string
          description: Временная метка последнего редактирования администратора.
          format: date-time
        creatorId:
          type: string
          description: Идентификатор создателя.
        creatorDisplayName:
          type: string
          description: Отображаемое имя создателя.
        passwordChangeRequired:
          type: boolean
          description: Флаг, идентифицирующий необходимость смены пароля.
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AdminListItemRole'
          description: Список ролей администратора.
        login:
          type: string
          description: Логин администратора.
        displayName:
          type: string
          description: Отображаемое имя администратора.
        description:
          type: string
          description: Описание администратора.
