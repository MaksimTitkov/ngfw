    BGP:
      required:
        - id
        - virtualRouterId
        - enabled
        - clusterEnabled
        - enforceFirstAs
        - fastFailover
        - defaultLocalPreference
        - gracefulShutdown
        - deterministicMed
        - alwaysCompareMed
        - gracefulRestart
        - restartTime
        - stalepathTime
        - deferTime
      type: object
      properties:
        id:
          type: string
          description: Уникальный идентификатор
        virtualRouterId:
          type: string
          description: Идентификатор виртуального роутера
        enabled:
          type: boolean
          description: Возможность включения или отключения BGP-процесса
        routerId:
          type: string
          description: >-
            Идентификатор маршрутизатора, используемый для идентификации
            маршрутизатора в домене BGP
        localAs:
          type: integer
          description: Номер автономной системы, к которой принадлежит VR
          format: uint32
        clusterEnabled:
          type: boolean
          description: Включение или отключение опции назначения Cluster ID
        clusterId:
          type: string
          description: Идентификатор кластера Route Reflector
        redistribution:
          allOf:
            - $ref: '#/components/schemas/BGPRedistribution'
          description: Профиля перераспределения маршрутов
        enforceFirstAs:
          type: boolean
          description: |-
            При включении маршрутизатор отбрасывает входящее
             сообщение Update, полученное от внешнего узла BGP (eBGP), который
             не указывает номер своей AS в начале AS_PATH
        fastFailover:
          type: boolean
          description: |-
            Эта опция заставляет bgp немедленно отключать
             соседей ebgp при разрыве соединения
        defaultLocalPreference:
          type: integer
          description: >-
            Локальное предпочтение по умолчанию, которое может использоваться
            для
             определения предпочтений между различными
             путями к одному и тому же пункту назначения.
          format: uint32
        gracefulShutdown:
          type: boolean
          description: |-
            Используется для минимизации или устранения потерь
             трафика в сети при проведении планового технического
             обслуживания маршрутизатора
        deterministicMed:
          type: boolean
          description: |-
            Изменяет процесс выбора лучшего пути.
             После включения опции, значение атрибута MED будет
             проверяться сразу после проверки AS-path
        alwaysCompareMed:
          type: boolean
          description: >-
            По умолчанию атрибут MED проверяется только при сравнении маршрутов
            из одной и той же AS.
             После включения опции, атрибут сравнивается и для маршрутов пришедших с разных AS.
        gracefulRestart:
          type: boolean
          description: Возможность включения или отключения опции Graceful Restart
        restartTime:
          type: integer
          description: >-
            Время (в секундах) ожидания удаления устаревших маршрутов до
            получения сообщения BGP open
          format: int32
        stalepathTime:
          type: integer
          description: >-
            Максимальное время (в секундах) удержания устаревших путей
            перезапускаемого пира
          format: int32
        deferTime:
          type: integer
          description: >-
            Время (в секундах), на которое перезапускаемый маршрутизатор
            откладывает процесс
             выбора маршрута после перезапуска
          format: int32
