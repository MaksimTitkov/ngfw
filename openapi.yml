        peerGroupId:
          type: string
          description: Уникальный идентификатор Peer Group, к которому привязан Peer
        name:
          type: string
          description: Наименование соседа
        enabled:
          type: boolean
          description: Возможность включения или отключения соседа
        remoteAs:
          type: integer
          description: Номер автономной системы соседа
          format: uint32
        peerAddress:
          type: string
          description: Сетевой адрес соседа
        virtualInterfaceIp:
          type: string
          description: IP-адрес из списка назначенных на выбранном субинтерфейсе
        authProfile:
          allOf:
            - $ref: '#/components/schemas/BGPPeerAuthProfile'
          description: Профиль аутентификации
        filterProfile:
          allOf:
            - $ref: '#/components/schemas/BGPPeerFilterProfile'
          description: Профиль фильтра
        keepaliveInterval:
          type: integer
          description: Интервал времени в секундах, между отправкой сообщений keepalive
          format: int32
        holdTimeInterval:
          type: integer
          description: >-
            Интервал времени в секундах, по истечении которого сосед будет
            считаться недоступным
          format: int32
        reconnectInterval:
          type: integer
          description: >-
            Интервал времени в секундах, который контролирует время ожидания BGP
            между попытками подключения к соседу
          format: int32
        delayOpen:
          type: integer
          description: >-
            Интервал времени в секундах для задержки между открытием
            TCP-соединения с peer и отправкой первого сообщения BGP Open для
            установления BGP-соединения
          format: int32
        advertisementInterval:
          type: integer
          description: >-
            Интервал времени в секундах (минимальное время), которое должно
            пройти между двумя последовательными сообщениями Update
          format: int32
        multihop:
          type: integer
          description: >-
            Включение опции позволяет устанавливать сеансы с соседями eBGP, если
            они находятся на расстоянии нескольких хопов. С возможностью указать
            значение времени жизни (TTL) в IP-заголовке
          format: int32
        weight:
          type: integer
          description: Задает значение веса по умолчанию для маршрутов соседа
          format: int32
        routeReflectorClient:
          type: boolean
          description: Эта опция позволяет назначить соседа, как route reflector client
        softReconfiguration:
          type: boolean
          description: >-
            Эта опция позволяет выполнить мягкую перезагрузку после обновления
            настроек любого из своих BGP-соседей
        nextHopSelf:
          enum:
            - BGP_NEXT_HOP_SELF_UNSPECIFIED
            - BGP_NEXT_HOP_SELF_NONE
            - BGP_NEXT_HOP_SELF_SELF
            - BGP_NEXT_HOP_SELF_FORCE
          type: string
          description: >-
            Эта опция позволяет менять адрес Next-Hop на свой при передаче
            маршрута IBGP-соседу
          format: enum
        asOverride:
          type: boolean
          description: 'TODO: Нет описания в аналитике'
        maxPrefix:
          type: string
          description: >-
            Эта опция устанавливает максимальное количество префиксов, которые
            мы можем получить от данного пира. Если это число будет превышено,
            BGP-сессия будет уничтожена
        maxPrefixForce:
          type: boolean
          description: Дополнительный параметр опции Max prefix
        sendCommunity:
          enum:
            - BGP_SEND_COMMUNITY_UNSPECIFIED
            - BGP_SEND_COMMUNITY_ALL
            - BGP_SEND_COMMUNITY_BOTH
            - BGP_SEND_COMMUNITY_EXTENDED
            - BGP_SEND_COMMUNITY_LARGE
            - BGP_SEND_COMMUNITY_STANDARD
            - BGP_SEND_COMMUNITY_NONE
          type: string
          description: Эта опция включает возможность отправки атрибута Community соседу
          format: enum
        attributeUnchanged:
          type: array
          items:
            enum:
              - BGP_ATTRIBUTE_UNCHANGED_UNSPECIFIED
              - BGP_ATTRIBUTE_UNCHANGED_ASPATH
              - BGP_ATTRIBUTE_UNCHANGED_NEXTHOP
              - BGP_ATTRIBUTE_UNCHANGED_MED
            type: string
            format: enum
          description: >-
            Эта опция задает атрибуты, которые должны оставаться неизменными для
            объявлений, отправляемых соседу
        defaultOriginate:
          type: boolean
          description: Эта опция позволяет объявить все маршруты по умолчанию
        defaultOriginateRouteMap:
          type: string
          description: Применить Route map для опции Default Route
        bfdProfile:
          allOf:
            - $ref: '#/components/schemas/BGPPeerBFDProfile'
          description: Профиль BFD
