            format: enum
          description: >-
            Эта опция задает атрибуты, которые должны оставаться неизменными для
            объявлений, отправляемых соседу
        defaultOriginate:
          type: boolean
          description: Эта опция позволяет объявить все маршруты по умолчанию
        defaultOriginateRouteMap:
          type: string
          description: Применить Route map для опции Default Route
        bfdProfileId:
          type: string
          description: Уникальный идентификатор профиля BFD
